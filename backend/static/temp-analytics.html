<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>THESIS · Temp Analytics</title>
    <link rel="stylesheet" href="/static/thesis.css?v=69" />
    <style>
      body { margin: 0; background: #000; color: #fff; font-family: Consolas, "Courier New", monospace; }
      .ta-wrap { max-width: 1200px; margin: 0 auto; padding: 1rem; }
      .ta-head { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.75rem; flex-wrap: wrap; }
      .ta-title { font-size: 14px; font-weight: 700; color: #ff9900; letter-spacing: 0.06em; text-transform: uppercase; }
      .ta-badge { padding: 0.15rem 0.45rem; font-size: 11px; font-weight: 700; border: 1px solid #333; color: #33cc33; }
      .ta-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.75rem; margin-bottom: 0.75rem; }
      .ta-card { border: 1px solid #333; background: #0a0a0a; padding: 0.75rem; }
      .ta-k { font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.35rem; }
      .ta-v { font-size: 22px; font-weight: 700; color: #00ffff; }
      .ta-sub { font-size: 11px; color: #aaa; margin-top: 0.25rem; }
      .ta-table-wrap { border: 1px solid #333; max-height: 62vh; overflow: auto; margin-bottom: 0.75rem; }
      table.ta-table { width: 100%; border-collapse: collapse; font-size: 10px; }
      .ta-table th, .ta-table td { padding: 0.35rem 0.45rem; border-bottom: 1px solid #222; text-align: left; vertical-align: top; }
      .ta-table th { position: sticky; top: 0; background: #111; color: #ff9900; z-index: 1; }
      .ta-foot { font-size: 10px; color: #666; }
      @media (max-width: 900px) { .ta-grid { grid-template-columns: 1fr 1fr; } }
    </style>
  </head>
  <body>
    <div class="ta-wrap">
      <div class="ta-head">
        <span class="ta-title">Temp Analytics · Today</span>
        <span class="ta-badge">DISPOSABLE</span>
        <span id="ta-updated" class="ta-sub"></span>
        <span style="flex: 1"></span>
        <a href="/" style="color: #00ffff; font-size: 11px">← App</a>
      </div>

      <div class="ta-grid">
        <div class="ta-card"><div class="ta-k">Sessions</div><div id="ta-sessions" class="ta-v">—</div></div>
        <div class="ta-card"><div class="ta-k">Active now</div><div id="ta-active" class="ta-v">—</div></div>
        <div class="ta-card"><div class="ta-k">Avg duration</div><div id="ta-avg" class="ta-v">—</div></div>
        <div class="ta-card"><div class="ta-k">Events logged</div><div id="ta-events" class="ta-v">—</div></div>
      </div>

      <div class="ta-k">Sessions (IP · location · device · duration)</div>
      <div class="ta-table-wrap">
        <table class="ta-table">
          <thead>
            <tr>
              <th>When</th>
              <th>Duration</th>
              <th>IP</th>
              <th>Location</th>
              <th>Device</th>
              <th>OS / Browser</th>
              <th>Ticker(s)</th>
              <th>Sections</th>
            </tr>
          </thead>
          <tbody id="ta-rows"></tbody>
        </table>
      </div>
      <p class="ta-foot">Auto-refresh 15s · Delete folder <code>backend/temp_analytics/</code> + <code>temp-analytics.js</code> to remove.</p>
    </div>
    <script>
      function esc(s) {
        return String(s ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
      }
      const params = new URLSearchParams(window.location.search);
      const key = params.get("key") || "";
      if (!key) {
        document.body.innerHTML = "<p style='padding:1rem;color:#ff9900;font-family:monospace'>Add ?key=YOUR_KEY to the URL.</p>";
      } else {
        async function refresh() {
          const res = await fetch("/api/temp-analytics/summary?key=" + encodeURIComponent(key));
          if (!res.ok) {
            document.getElementById("ta-rows").innerHTML = "<tr><td colspan='8'>Access denied or error.</td></tr>";
            return;
          }
          const data = await res.json();
          const t = data.totals || {};
          document.getElementById("ta-sessions").textContent = t.sessions ?? 0;
          document.getElementById("ta-active").textContent = t.active_now ?? 0;
          document.getElementById("ta-avg").textContent = t.avg_duration_label || "0s";
          document.getElementById("ta-events").textContent = t.events ?? 0;
          document.getElementById("ta-updated").textContent = "Updated " + new Date().toLocaleTimeString();
          document.getElementById("ta-rows").innerHTML = (data.sessions || [])
            .map(function (s) {
              const loc = [s.city, s.region, s.country].filter(Boolean).join(", ") || "—";
              const dev = [s.device, s.screen].filter(Boolean).join(" · ");
              const osb = [s.os, s.browser].filter(Boolean).join(" / ");
              return (
                "<tr><td>" + esc((s.started_at || "").replace("T", " ").replace("Z", " UTC")) +
                "</td><td>" + esc(s.duration_label) +
                "</td><td>" + esc(s.ip) +
                "</td><td>" + esc(loc) + (s.isp ? "<br><span style='color:#666'>" + esc(s.isp) + "</span>" : "") +
                "</td><td>" + esc(dev) +
                "</td><td>" + esc(osb) + (s.lang ? "<br><span style='color:#666'>" + esc(s.lang) + "</span>" : "") +
                "</td><td>" + esc((s.tickers || []).join(", ") || "—") +
                "</td><td>" + esc((s.sections || []).join(" ") || "—") +
                "</td></tr>"
              );
            })
            .join("") || "<tr><td colspan='8'>No sessions yet.</td></tr>";
        }
        refresh();
        setInterval(refresh, 15000);
      }
    </script>
  </body>
</html>
