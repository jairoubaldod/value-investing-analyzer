<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>THESIS · MAGIC NUMBERS</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="/static/thesis.css?v=12" />
  </head>
  <body>
    <div class="bb-terminal">
      <!-- Bloomberg quote row: ticker badge + cyan market strip -->
      <div class="bb-quote-row">
        <span class="bb-ticker-badge" id="bb-badge">MSFT</span>
        <span class="bb-fx" id="bb-fx">US $</span>
        <div class="bb-ticker-lookup">
          <label class="bb-lookup-label" for="ticker-select">TICKER</label>
          <select id="ticker-select" class="bb-ticker-select" aria-label="Select ticker"></select>
          <button type="button" id="ticker-go" class="bb-ticker-go">GO</button>
        </div>
        <span class="bb-spacer"></span>
        <span class="bb-market-strip" id="bb-market-strip">Market P — / —</span>
      </div>

      <!-- Red toolbar (Bloomberg chart header) -->
      <div class="bb-redbar">
        <span class="bb-redbar-item">Thesis Tool</span>
        <span class="bb-redbar-sep">|</span>
        <span class="bb-redbar-title">Magic Numbers</span>
        <span class="bb-spacer"></span>
        <span class="bb-redbar-security" id="bb-redbar-security">MSFT US Equity</span>
      </div>

      <div class="app">
        <aside class="sidebar">
          <div class="bb-panel-head">
            <span class="bb-key">NAV</span>
            <span class="bb-panel-title">Sections</span>
          </div>
          <h1 id="company-name" class="bb-security">Loading…</h1>
          <p id="company-meta" class="meta"></p>
          <nav id="block-nav" class="block-nav"></nav>
          <p class="sidebar-note">Top 10 US · cached fundamentals</p>
        </aside>

        <main class="main">
          <section class="charts-panel">
            <div class="bb-panel-head">
              <span class="bb-key">GP</span>
              <span class="bb-panel-title">Graphs</span>
            </div>
            <div id="charts-grid" class="charts-grid"></div>
          </section>
          <section class="tables-panel">
            <div class="bb-panel-head">
              <span class="bb-key">MN</span>
              <span class="bb-panel-title">Magic Numbers</span>
            </div>
            <div id="blocks-container"></div>
          </section>
        </main>
      </div>

      <footer class="bb-statusbar">
        <span id="bb-source-status" class="bb-status-item">Source: —</span>
        <span class="bb-sep">|</span>
        <span class="bb-status-item">Engine: Magic Numbers</span>
        <span class="bb-spacer"></span>
        <span id="bb-clock" class="bb-status-item bb-dim"></span>
      </footer>
    </div>
    <script src="/static/thesis.js?v=15"></script>
  </body>
</html>
